name: Keep Backend Awake

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -f https://${{ secrets.BACKEND_URL }}/api/health || exit 1
          echo "✅ Backend pinged successfully at $(date)"

